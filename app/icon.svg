<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0b7a70"/>
  <!-- Grid lines -->
  <line x1="9" y1="10" x2="9" y2="24" stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>
  <line x1="15" y1="10" x2="15" y2="24" stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>
  <line x1="21" y1="10" x2="21" y2="24" stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>
  <line x1="9" y1="12" x2="27" y2="12" stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>
  <line x1="9" y1="18" x2="27" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>
  <line x1="9" y1="24" x2="27" y2="24" stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>
  <!-- Y axis -->
  <line x1="9" y1="8" x2="9" y2="25" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- X axis -->
  <line x1="8" y1="24" x2="28" y2="24" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Y arrowhead -->
  <polygon points="9,7 7,12 11,12" fill="white"/>
  <!-- X arrowhead -->
  <polygon points="29,24 24,22 24,26" fill="white"/>
</svg>
